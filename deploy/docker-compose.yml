# Portal tier: PostgreSQL + gunicorn(Flask) behind nginx.
# Collectors run separately on each datacenter host (see ipmgmt-collector.service).
#
#   cd deploy && cp .env.example .env && edit .env
#   docker compose up -d --build
#   open http://localhost/         (and /settings)
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ipmgmt
      POSTGRES_USER: ipm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ipmpass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ipm -d ipmgmt"]
      interval: 10s
      timeout: 5s
      retries: 5

  portal:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://ipm:${POSTGRES_PASSWORD:-ipmpass}@db:5432/ipmgmt
      INGEST_API_KEY: ${INGEST_API_KEY:?set INGEST_API_KEY in .env}
      ADMIN_TOKEN: ${ADMIN_TOKEN:?set ADMIN_TOKEN in .env}
      GUNICORN_WORKERS: "4"
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      # - "443:443"   # enable after mounting certs (see nginx.conf)
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./certs:/etc/nginx/certs:ro
    depends_on:
      - portal

volumes:
  pgdata:
