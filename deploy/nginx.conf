upstream ipmgmt_portal {
    server portal:8000;
}

# HTTP. For production, terminate TLS here (see the commented 443 block below)
# and redirect 80 -> 443.
server {
    listen 80;
    server_name _;

    # Ingest batches from large subnets can be sizable JSON payloads.
    client_max_body_size 25m;

    location / {
        proxy_pass         http://ipmgmt_portal;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

